<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collatz-vizualizáció</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <h1>Collatz-sejtés</h1>
        <p class="intro">Bármilyen pozitív egész számból indulunk ki, a sorozat előbb-utóbb eléri az 1-et.</p>

        <div class="formula-box">
            <span>Ha <b>páros</b>: n / 2</span>
            <span>Ha <b>páratlan</b>: 3n + 1</span>
        </div>

        <div class="input-group">
            <input type="number" id="szam" placeholder="Adj meg egy számot..." min="1">
            <button onclick="inditCollatz()">Számítás indítása</button>
        </div>

        <div id="status-message"></div>
        
        <div id="step-display" class="step-card">
            Vár várakozás...
        </div>

        <div class="log-container">
            <h3>Számítási napló</h3>
            <div id="results"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
